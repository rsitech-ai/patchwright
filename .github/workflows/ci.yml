name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify toolchains
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version
          rustc --version
          cargo --version

      - name: Resolve locked dependencies
        run: |
          set -euo pipefail
          swift package resolve
          cargo fetch --locked
          git diff --exit-code -- Package.resolved Cargo.lock

      - name: Audit Rust dependencies
        run: |
          set -euo pipefail
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --deny warnings

      - name: Scan tracked source and full history for secrets
        run: |
          set -euo pipefail
          evidence_root="$(mktemp -d)"
          mkdir -p "$evidence_root/evidence"
          ./script/scan_publication_secrets.sh \
            --repo "$GITHUB_WORKSPACE" \
            --artifact-root "$evidence_root" \
            --output "$evidence_root/evidence/secret-scan.json"

      - name: Run verification
        run: ./script/verify.sh

      - name: Run smoke suite
        run: ./script/smoke.sh
