version: 1
autonomy:
  default: prepare
  push: approval
  create_pull_request: approval
  resolve_comments: approval
  merge: disabled
commands:
  test:
    - ./script/verify.sh
limits:
  max_changed_files: 30
  max_diff_lines: 1600
  max_fix_attempts: 3
protected_paths:
  - .github/workflows/**
review:
  minimum_severity: P2
  maximum_inline_comments: 12
  require_failure_scenario: true
  require_suggested_test: true

